name: Release

on:
  push:
    branches: [main]

# Prevent concurrent releases stomping on each other
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Skip if this push is the version-bump commit itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the version-bump push triggers no further workflows
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: version
        shell: pwsh
        run: |
          npm version patch --no-git-tag-version
          $v = node -p "require('./package.json').version"
          Write-Output "version=$v" >> $env:GITHUB_OUTPUT
          git add package.json
          git commit -m "chore: release v$v [skip ci]"
          git tag "v$v"
          git push origin main --follow-tags

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        run: npm run build
        env:
          # Prevents electron-builder from trying to auto-publish
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.exe
